const SECTOR_RULES = [{

/* Returns ALL matching sector keys for a given job title. */
function getSectors(jobTitle) {
  const t = (jobTitle || '').toLowerCase();
  const matched = [];
  for (const s of SECTOR_RULES) {
    if (s.keywords.some(k => t.includes(k))) matched.push(s.key);
  }
  return matched;
}

/* Returns the PRIMARY (first) matching sector — used for the badge on
   the card. Trade always wins over management because trades are listed
   first in SECTOR_RULES. */
function getSector(jobTitle) {
  const all = getSectors(jobTitle);
  return all.length > 0 ? all[0] : null;
}

/* ── EXPORT ──
   Build a fresh HTML file from the current document by:
   1. Cloning documentElement
   2. Replacing the qs-data script's textContent with new JSON
   3. Resetting #root and #boot to their initial state
   4. Serialising as a Blob and triggering download
*/
function exportUpdatedFile(allCandidates) {
  try {
    // Clone the live document
    const cloneRoot = document.documentElement.cloneNode(true);

    // Reset #boot and #root in clone
    const bootEl = cloneRoot.querySelector('#boot');
    if (bootEl) {
      bootEl.classList.remove('gone');
      bootEl.textContent = 'Loading Talent Network\u2026';
    }
    const rootEl = cloneRoot.querySelector('#root');
    if (rootEl) {
      rootEl.innerHTML = '';
    }

    // Replace data block content
    const dataEl = cloneRoot.querySelector('#qs-data');
    if (!dataEl) {
      alert('Data block missing — cannot export.');
      return;
    }
    dataEl.textContent = '\n' + JSON.stringify(allCandidates, null, 2) + '\n';

    // Serialize
    const html = '<!DOCTYPE html>\n' + cloneRoot.outerHTML;
    const blob = new Blob([html], {
      type: 'text/html'
    });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'recruitment-network.html';
    document.body.appendChild(a);
    a.click();
    setTimeout(function () {
      URL.revokeObjectURL(url);
      document.body.removeChild(a);
    }, 600);
  } catch (err) {
    console.error(err);
    alert('Export failed: ' + err.message);
  }
}

function parseCSV(text) {

    'london': 'london',
    'south-east': 'south-east',
    'southeast': 'south-east',
    'south east': 'south-east',
    'east-england': 'east-england',
    'east of england': 'east-england',
    'east england': 'east-england',
    'south-west': 'south-west',
    'southwest': 'south-west',
    'south west': 'south-west',
    'midlands': 'midlands',
    'yorkshire': 'yorkshire',
    'north-west': 'north-west',
    'northwest': 'north-west',
    'north west': 'north-west',
    'north-east': 'north-east',
    'northeast': 'north-east',
    'north east': 'north-east',
    'scotland': 'scotland',
    'wales': 'wales'
  };
  for (let i = start; i < lines.length; i++) {
    const line = lines[i].trim();
    if (!line) continue;
    const fields = [];
    let cur = '',
      inQ = false;
    for (let c = 0; c < line.length; c++) {
      if (line[c] === '"') {
        inQ = !inQ;
      } else if (line[c] === ',' && !inQ) {
        fields.push(cur.trim());
        cur = '';
      } else cur += line[c];
    }
    fields.push(cur.trim());
    const [code, jobTitle, region, location, salary, exp, notice, skills, summary] = fields;
    if (!code) {
      errors.push('Row ' + (i + 1) + ': missing code');
      continue;
    }
    if (!jobTitle) {
      errors.push('Row ' + (i + 1) + ': missing jobTitle');
      continue;
    }
    const regRaw = (region || '').toLowerCase().trim();
    const reg = regNorm[regRaw];
    if (!reg) {
      errors.push('Row ' + (i + 1) + ' (' + code + '): invalid region "' + region + '". Valid: ' + Object.keys(regNorm).filter(k => k.indexOf(' ') < 0 && k.indexOf('-') >= 0 || ['london', 'midlands', 'yorkshire', 'scotland', 'wales'].includes(k)).join(', '));
      continue;
    }
    if (!location) {
      errors.push('Row ' + (i + 1) + ': missing location');
      continue;
    }
    rows.push({
      id: Date.now() + i,
      code: code.trim().toUpperCase(),
      jobTitle: jobTitle.trim(),
      region: reg,
      location: location.trim(),
      salary: (salary || 'TBC').trim(),
      experience: parseInt(exp) || 0,
      noticePeriod: (notice || 'TBC').trim(),
      skills: (skills || '').split(',').map(s => s.trim()).filter(Boolean),
      summary: (summary || '').trim()
    });
  }
  return {
    rows,
    errors
  };
}
