/* ── EXPORT ──
   Build a fresh HTML file from the current document by:
   1. Cloning documentElement
   2. Replacing the qs-data script's textContent with new JSON
   3. Resetting #root and #boot to their initial state
   4. Serialising as a Blob and triggering download

function exportUpdatedFile(allCandidates) {
  try {
    // Clone the live document
    const cloneRoot = document.documentElement.cloneNode(true);
 
    // Reset #boot and #root in clone
    const bootEl = cloneRoot.querySelector('#boot');
    if (bootEl) {
      bootEl.classList.remove('gone');
      bootEl.textContent = 'Loading Talent Network\u2026';
    }
    const rootEl = cloneRoot.querySelector('#root');
    if (rootEl) {
      rootEl.innerHTML = '';
    }
 
    // Replace data block content
    const dataEl = cloneRoot.querySelector('#qs-data');
    if (!dataEl) {
      alert('Data block missing — cannot export.');
      return;
    }
    dataEl.textContent = '\n' + JSON.stringify(allCandidates, null, 2) + '\n';
 
    // Serialize
    const html = '<!DOCTYPE html>\n' + cloneRoot.outerHTML;
    const blob = new Blob([html], {
      type: 'text/html'
    });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'recruitment-network.html';
    document.body.appendChild(a);
    a.click();
    setTimeout(function () {
      URL.revokeObjectURL(url);
      document.body.removeChild(a);
    }, 600);
  } catch (err) {
    console.error(err);
    alert('Export failed: ' + err.message);
  }
}
